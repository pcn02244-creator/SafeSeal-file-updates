<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>바코드 검증 — SafeSeal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

  <!-- 기존 앱 데이터 레이어 (읽기 전용 재사용) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/core.js"></script>
  <script src="js/auth.js"></script>

  <style>
    /* ── Design tokens (shipment.html 동일) ─────── */
    :root {
      --p:   #004E89;
      --s:   #38AECC;
      --g:   #059669;
      --r:   #DC2626;
      --fn:  'Hanken Grotesk', -apple-system, sans-serif;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--fn);
      background: #0a0a0a; color: #fff;
      -webkit-text-size-adjust: 100%;
    }

    /* ── App shell ───────────────────────────────── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── Top header ──────────────────────────────── */
    #header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      height: 48px;
      background: rgba(0,0,0,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    #header .mi {
      font-family: 'Material Symbols Outlined';
      font-size: 20px; color: rgba(255,255,255,.45);
      cursor: pointer; user-select: none;
      transition: color .15s;
    }
    #header .mi:hover { color: rgba(255,255,255,.8); }
    #header h1 {
      flex: 1;
      font-size: 15px; font-weight: 700; letter-spacing: .02em;
      color: rgba(255,255,255,.9);
    }
    #master-badge {
      font-size: 10px; font-weight: 600; letter-spacing: .04em;
      padding: 3px 8px; border-radius: 10px;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.4);
      transition: all .3s;
    }
    #master-badge.loaded {
      background: rgba(5,150,105,.18);
      color: #34d399;
    }
    #master-badge.error {
      background: rgba(220,38,38,.18);
      color: #fca5a5;
    }
    #sync-btn {
      font-family: 'Material Symbols Outlined';
      font-size: 18px; color: rgba(255,255,255,.35);
      cursor: pointer; user-select: none;
      transition: color .15s;
    }
    #sync-btn:hover { color: rgba(255,255,255,.75); }

    /* ── Status chips ────────────────────────────── */
    #status-bar {
      flex-shrink: 0;
      display: flex; justify-content: center; gap: 8px;
      padding: 10px 16px;
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .chip {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700; letter-spacing: .04em;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.4);
      transition: all .25s cubic-bezier(.4,0,.2,1);
      user-select: none;
    }
    .chip .mi {
      font-family: 'Material Symbols Outlined';
      font-size: 14px; line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400;
    }
    .chip.done {
      background: rgba(5,150,105,.18);
      border-color: rgba(5,150,105,.6);
      color: #34d399;
    }
    .chip.done .mi {
      font-variation-settings: 'FILL' 1, 'wght' 400;
    }
    /* flash animation when newly scanned */
    @keyframes chipFlash {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }
    .chip.flash { animation: chipFlash .3s ease; }

    /* ── Camera viewfinder ───────────────────────── */
    #cam-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #111; min-height: 0;
    }
    #cam-video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* scan guide overlay */
    .scan-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .scan-box {
      width: min(76vw, 300px);
      aspect-ratio: 3 / 1;
      position: relative;
      border-radius: 10px;
      /* corner marks via border-image trick */
      background:
        linear-gradient(to right, #38AECC 2px, transparent 2px) top 0 left 0  / 22px 22px no-repeat,
        linear-gradient(to bottom,#38AECC 2px, transparent 2px) top 0 left 0  / 22px 22px no-repeat,
        linear-gradient(to left,  #38AECC 2px, transparent 2px) top 0 right 0 / 22px 22px no-repeat,
        linear-gradient(to bottom,#38AECC 2px, transparent 2px) top 0 right 0 / 22px 22px no-repeat,
        linear-gradient(to right, #38AECC 2px, transparent 2px) bottom 0 left 0  / 22px 22px no-repeat,
        linear-gradient(to top,   #38AECC 2px, transparent 2px) bottom 0 left 0  / 22px 22px no-repeat,
        linear-gradient(to left,  #38AECC 2px, transparent 2px) bottom 0 right 0 / 22px 22px no-repeat,
        linear-gradient(to top,   #38AECC 2px, transparent 2px) bottom 0 right 0 / 22px 22px no-repeat;
    }
    /* dim surroundings */
    .scan-box::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(0,0,0,.38);
      z-index: -1;
    }
    /* moving scan line */
    @keyframes scanline {
      0%   { top: 8%; opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { top: 92%; opacity: 0; }
    }
    .scan-line {
      position: absolute; left: 6px; right: 6px; height: 2px;
      background: linear-gradient(to right, transparent, #38AECC 20%, #38AECC 80%, transparent);
      box-shadow: 0 0 10px 2px rgba(56,174,204,.5);
      top: 50%;
      animation: scanline 2.2s ease-in-out infinite;
    }

    /* ── Bottom panel ────────────────────────────── */
    #bottom {
      flex-shrink: 0;
      background: rgba(6,6,6,.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,.07);
      padding: 14px 20px 16px;
    }

    #scan-msg {
      text-align: center;
      font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,.7);
      min-height: 22px;
      margin-bottom: 12px;
    }
    #scan-msg .type-label {
      color: #38AECC; font-weight: 700;
    }

    /* result box */
    #result-box {
      display: none; border-radius: 10px;
      padding: 14px 16px; text-align: center;
      margin-bottom: 12px;
    }
    #result-box.pass {
      display: block;
      background: rgba(5,150,105,.12);
      border: 1.5px solid rgba(5,150,105,.5);
    }
    #result-box.fail {
      display: block;
      background: rgba(220,38,38,.12);
      border: 1.5px solid rgba(220,38,38,.5);
    }
    .res-icon { font-size: 26px; margin-bottom: 4px; }
    .res-title {
      font-size: 22px; font-weight: 800; letter-spacing: .06em;
    }
    .pass .res-title { color: #34d399; }
    .fail .res-title { color: #f87171; }
    .res-detail {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,.55);
      margin-top: 6px; line-height: 1.7;
      white-space: pre-line;
    }

    /* manual input fallback (iOS / BarcodeDetector 미지원) */
    #manual-section {
      display: none; margin-bottom: 12px;
    }
    #manual-section.show { display: block; }
    .manual-notice {
      font-size: 11px; color: rgba(255,255,255,.4);
      text-align: center; margin-bottom: 10px;
    }
    .manual-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 7px;
    }
    .manual-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: .05em;
      color: rgba(255,255,255,.4); text-transform: uppercase;
      min-width: 48px; text-align: right;
    }
    .manual-inp {
      flex: 1; background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 7px; padding: 8px 11px;
      color: #fff; font-family: 'Hanken Grotesk', monospace;
      font-size: 13px; outline: none;
      transition: border-color .15s;
    }
    .manual-inp:focus { border-color: #38AECC; }
    .manual-inp.filled { border-color: rgba(5,150,105,.7); color: #34d399; }
    #manual-go-btn {
      display: none; width: 100%; margin-top: 4px;
      padding: 10px; border-radius: 8px;
      background: var(--p); border: none; color: #fff;
      font-family: var(--fn); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    #manual-go-btn.show { display: block; }
    #manual-go-btn:active { opacity: .8; }

    /* action button */
    #rescan-btn {
      display: none; width: 100%;
      padding: 11px; border-radius: 8px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.85);
      font-family: var(--fn); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    #rescan-btn.show { display: block; }
    #rescan-btn:active { background: rgba(255,255,255,.17); }

    /* PC redirect notice (scanner.html이 PC에서 열렸을 때) */
    #pc-notice {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: #F8FAFC; color: #0f172a;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; font-family: var(--fn); text-align: center; padding: 24px;
    }
    #pc-notice .mi {
      font-family: 'Material Symbols Outlined'; font-size: 48px; color: #38AECC;
    }
    #pc-notice h2 { font-size: 20px; font-weight: 700; color: #004E89; }
    #pc-notice p  { font-size: 13px; color: #64748b; }
    #go-pc-btn {
      padding: 10px 24px; border-radius: 8px;
      background: #004E89; color: #fff; border: none;
      font-family: var(--fn); font-size: 14px; font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- PC 접속 안내 (모바일 전용 페이지) -->
<div id="pc-notice">
  <span class="mi">smartphone</span>
  <h2>모바일 전용 페이지</h2>
  <p>바코드 검증 스캐너는 모바일 기기에서 사용해 주세요.<br>PC에서는 기존 출하 관리 앱을 이용하세요.</p>
  <button id="go-pc-btn" onclick="location.href='./shipment.html'">출하 관리 앱으로 이동</button>
</div>

<!-- Main app -->
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <span class="mi" id="back-btn" title="출하 관리로 이동">arrow_back</span>
    <h1>바코드 검증</h1>
    <div id="batch-badge" style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.04em;margin-right:2px" title="활성 배치 날짜"></div>
    <div id="master-badge">로드 중...</div>
    <span class="mi" id="sync-btn" title="재동기화" onclick="doSync().then(()=>scanMsg.textContent='')">sync</span>
  </div>

  <!-- STATUS CHIPS -->
  <div id="status-bar">
    <div class="chip" id="chip-PO">
      <span class="mi">receipt_long</span>PO
    </div>
    <div class="chip" id="chip-TKM">
      <span class="mi">qr_code_2</span>0247#
    </div>
    <div class="chip" id="chip-SN">
      <span class="mi">pin</span>SN
    </div>
  </div>

  <!-- CAMERA VIEWFINDER -->
  <div id="cam-wrap">
    <video id="cam-video" playsinline autoplay muted></video>
    <div class="scan-overlay" id="scan-overlay">
      <div class="scan-box">
        <div class="scan-line" id="scan-line"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom">

    <div id="scan-msg">카메라 준비 중...</div>

    <!-- PASS / FAIL result -->
    <div id="result-box">
      <div class="res-icon" id="res-icon"></div>
      <div class="res-title" id="res-title"></div>
      <div class="res-detail" id="res-detail"></div>
    </div>

    <!-- Manual input (iOS / BarcodeDetector 미지원) -->
    <div id="manual-section">
      <div class="manual-notice">자동 스캔 미지원 기기 — 바코드 번호를 직접 입력하세요</div>
      <div class="manual-row">
        <span class="manual-lbl">PO</span>
        <input class="manual-inp" id="m-po" type="text" placeholder="PO 번호 (예: 4522449554)"
               autocapitalize="characters" autocomplete="off" spellcheck="false"
               oninput="onManualChange('PO', this.value)">
      </div>
      <div class="manual-row">
        <span class="manual-lbl">0247#</span>
        <input class="manual-inp" id="m-tkm" type="text" placeholder="0247-XXXXX"
               autocapitalize="characters" autocomplete="off" spellcheck="false"
               oninput="onManualChange('TKM', this.value)">
      </div>
      <div class="manual-row">
        <span class="manual-lbl">SN</span>
        <input class="manual-inp" id="m-sn" type="text" placeholder="시리얼 번호"
               autocapitalize="characters" autocomplete="off" spellcheck="false"
               oninput="onManualChange('SN', this.value)">
      </div>
      <button id="manual-go-btn" onclick="runManualVerify()">검증하기</button>
    </div>

    <button id="rescan-btn" onclick="resetScanner()">↺ 재스캔</button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   SafeSeal Mobile Barcode Scanner
   검증: verification_sets (Supabase) 기반 3-way 교차 검증
   core.js의 syncVerificationSets() / verifyBarcodeSet() 사용
═══════════════════════════════════════════════ */

/* ── 상수 ─────────────────────────────────── */
const BARCODE_TYPES  = ['PO', 'TKM', 'SN'];
const CHIP_ICONS     = { PO: 'receipt_long', TKM: 'qr_code_2', SN: 'pin' };
const CHIP_DONE_ICON = 'check_circle';
const NEXT_HINT      = {
  PO:  'PO 바코드 (거래명세서 CODE128)',
  TKM: '0247# 바코드 (PTN 라벨)',
  SN:  'SN 바코드 (제품 시리얼)',
};
const FIELD_LABEL = { po: 'PO', sn: 'SN', ptn_no: '0247#(PTN)' };

/* ── 상태 ─────────────────────────────────── */
let scanned      = { PO: null, TKM: null, SN: null };
let lastScanType = null;  // 직전 스캔 종류 (연속 동일 타입 감지)
let lastScanRaw  = null;  // 직전 스캔 원시값 (완전 중복 방지)
let scanning     = false;
let camStream    = null;

/* ── DOM ──────────────────────────────────── */
const $ = id => document.getElementById(id);
const scanMsg    = $('scan-msg');
const resultBox  = $('result-box');
const rescanBtn  = $('rescan-btn');
const masterBadge = $('master-badge');

/* ── PC 감지 ──────────────────────────────── */
(function() {
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (!isMobile) {
    $('pc-notice').style.display = 'flex';
    $('app').style.display = 'none';
  }
})();

/* ── 뒤로 가기 ──────────────────────────────── */
$('back-btn').addEventListener('click', () => {
  if (camStream) camStream.getTracks().forEach(t => t.stop());
  location.href = './shipment.html';
});

/* ══════════════════════════════════════════
   verification_sets 동기화 (core.js의 syncVerificationSets 래퍼)
══════════════════════════════════════════ */
async function doSync() {
  const activeBatch = getActiveBatch();
  const batchBadge  = $('batch-badge');
  if (batchBadge) batchBadge.textContent = activeBatch || '';

  masterBadge.textContent = '동기화 중...';
  masterBadge.className   = '';
  try {
    const { synced, batch_date } = await syncVerificationSets(activeBatch);
    if (synced > 0) {
      masterBadge.textContent = `${synced}건 준비`;
      masterBadge.classList.add('loaded');
      if (batchBadge) batchBadge.textContent = batch_date || activeBatch || '';
    } else {
      masterBadge.textContent = '데이터 없음';
      masterBadge.classList.add('error');
      scanMsg.textContent = '⚠ PC에서 견적 생성 후 재접속';
    }
  } catch (e) {
    masterBadge.textContent = '동기화 오류';
    masterBadge.classList.add('error');
    console.warn('syncVerificationSets 오류:', e.message);
    scanMsg.textContent = '⚠ ' + e.message;
  }
}

/* ══════════════════════════════════════════
   바코드 종류 분류
   - TKM: 0247 로 시작 (PTN 라벨)
   - PO:  순수 숫자 10~13자리 (거래명세서 CODE128)
   - SN:  그 외 (제품 시리얼)
══════════════════════════════════════════ */
function classifyBarcode(raw) {
  const v = raw.trim().replace(/\s+/g, '').toUpperCase();
  if (/^0247/i.test(v))        return 'TKM';
  if (/^\d{10,13}$/.test(v))   return 'PO';
  return 'SN';
}

/* ══════════════════════════════════════════
   3-way 검증 (verification_sets 기반, core.js verifyBarcodeSet 사용)
══════════════════════════════════════════ */
async function runVerify() {
  scanning = false;
  $('scan-line').style.animationPlayState = 'paused';
  scanMsg.innerHTML = '<span style="color:#38AECC;font-weight:700">검증 중...</span>';

  const result = await verifyBarcodeSet({
    po:     scanned.PO  || '',
    sn:     scanned.SN  || '',
    ptn_no: scanned.TKM || '',
  });

  showResult(result);
}

/* ══════════════════════════════════════════
   결과 표시
══════════════════════════════════════════ */
function showResult(result) {
  const ok = result.pass;
  $('scan-line').style.animationPlayState = 'paused';
  scanMsg.innerHTML = '';
  rescanBtn.classList.add('show');

  resultBox.className        = ok ? 'pass' : 'fail';
  $('res-icon').textContent  = ok ? '✅' : '❌';
  $('res-title').textContent = ok ? 'PASS' : 'FAIL';

  if (ok) {
    $('res-detail').textContent =
      `주문번호: ${result.order_no}\nPO: ${scanned.PO}\n0247#: ${scanned.TKM || '—'}\nSN: ${scanned.SN}`;
  } else if (result.error) {
    $('res-detail').textContent = result.error;
  } else if (result.mismatch_field) {
    const fname = FIELD_LABEL[result.mismatch_field] || result.mismatch_field;
    const fval  = result.mismatch_field === 'sn' ? scanned.SN
                : result.mismatch_field === 'ptn_no' ? scanned.TKM : scanned.PO;
    $('res-detail').textContent = `불일치: ${fname} "${fval}"\n주문번호: ${result.order_no || '—'}`;
  } else {
    $('res-detail').textContent = '검증 실패';
  }

  if (navigator.vibrate) navigator.vibrate(ok ? [80, 40, 80] : [200, 80, 200]);
}

/* ══════════════════════════════════════════
   스캔 성공 처리 (카메라 BarcodeDetector)

   중복/연속 처리 규칙:
   1. 동일 원시값 재스캔 → 완전 무시 (카메라 연사 방지)
   2. 직전과 동일 타입 연속 스캔 → 해당 슬롯의 이전 값 탈락,
      새 값으로 갱신 (다른 슬롯 유지, 탈락 피드백 표시)
   3. 그 외 → 해당 슬롯 채움 / 갱신
   4. 3개 슬롯 모두 채워지면 → 검증 실행
══════════════════════════════════════════ */
function onScan(raw) {
  if (!scanning) return;

  const v    = raw.trim().replace(/\s+/g, '').toUpperCase();
  const type = classifyBarcode(v);

  /* 1. 완전 동일 원시값 연속 재스캔 → 무시 */
  if (v === lastScanRaw) return;
  lastScanRaw = v;

  /* 2. 직전과 같은 타입 연속 스캔 → 슬롯 탈락 + 새 값으로 갱신 */
  if (type === lastScanType && scanned[type]) {
    /* 칩 flash → 탈락 시각 피드백 */
    const chip = $('chip-' + type);
    chip.classList.remove('done');
    chip.querySelector('.mi').textContent = CHIP_ICONS[type];
    void chip.offsetWidth; // reflow
    chip.classList.add('flash');
    chip.addEventListener('animationend', () => chip.classList.remove('flash'), { once: true });
    if (navigator.vibrate) navigator.vibrate([30, 30, 30]); // 탈락 진동
  }

  /* 슬롯 갱신 */
  scanned[type] = v;
  lastScanType  = type;

  /* 칩 done 상태 */
  const chip = $('chip-' + type);
  chip.classList.add('done');
  chip.querySelector('.mi').textContent = CHIP_DONE_ICON;
  chip.classList.add('flash');
  chip.addEventListener('animationend', () => chip.classList.remove('flash'), { once: true });

  if (navigator.vibrate) navigator.vibrate(55);

  /* 완료 여부 확인 */
  const remaining = BARCODE_TYPES.filter(t => !scanned[t]);
  if (remaining.length === 0) {
    setTimeout(runVerify, 350); // runVerify는 async
  } else {
    const next = remaining[0];
    scanMsg.innerHTML = `다음: <span class="type-label">${NEXT_HINT[next]}</span>`;
  }
}

/* ══════════════════════════════════════════
   카메라 시작 + BarcodeDetector 루프
══════════════════════════════════════════ */
async function startCamera() {
  const video = $('cam-video');

  /* 카메라 획득 */
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 }, height: { ideal: 1080 },
      },
      audio: false,
    });
    video.srcObject = camStream;
    await video.play();
  } catch (err) {
    scanMsg.textContent = '카메라 접근 실패: ' + err.message;
    showManualSection('카메라를 사용할 수 없습니다.');
    return;
  }

  /* BarcodeDetector 지원 여부 확인 */
  if (!('BarcodeDetector' in window)) {
    showManualSection('이 기기는 자동 스캔을 지원하지 않습니다.');
    return;
  }

  const detector = new BarcodeDetector({
    formats: ['code_128', 'code_39', 'qr_code', 'data_matrix', 'ean_13', 'ean_8', 'upc_a', 'upc_e'],
  });

  scanning = true;
  scanMsg.innerHTML = `<span class="type-label">${NEXT_HINT.PO}</span>를 스캔하세요`;

  /* 프레임 루프 */
  const tick = async () => {
    if (!camStream?.active) return;
    if (!scanning) {
      /* 완료 후에도 프레임은 유지 (카메라 켜 둠) */
      requestAnimationFrame(tick);
      return;
    }
    if (video.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA) {
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) onScan(codes[0].rawValue);
      } catch (_) {}
    }
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════
   수동 입력 (iOS 등 BarcodeDetector 미지원)
══════════════════════════════════════════ */
function showManualSection(notice) {
  $('scan-overlay').style.display = 'none';
  const sec = $('manual-section');
  sec.classList.add('show');
  if (notice) sec.querySelector('.manual-notice').textContent = notice;
  scanMsg.textContent = '';
}

function onManualChange(type, value) {
  const v = value.trim().toUpperCase().replace(/\s+/g, '');
  scanned[type] = v || null;

  /* 입력 필드 스타일 */
  const inp = $('m-' + type.toLowerCase());
  inp.classList.toggle('filled', !!v);

  /* 칩 갱신 */
  const chip = $('chip-' + type);
  chip.classList.toggle('done', !!v);
  chip.querySelector('.mi').textContent = v ? CHIP_DONE_ICON : CHIP_ICONS[type];

  /* 검증 버튼 노출 조건: 3개 모두 값이 있을 때 */
  const allFilled = BARCODE_TYPES.every(t => scanned[t]);
  $('manual-go-btn').classList.toggle('show', allFilled);
}

function runManualVerify() {
  $('manual-section').classList.remove('show');
  $('manual-go-btn').classList.remove('show');
  runVerify(); // async — 내부에서 Supabase 조회
}

/* ══════════════════════════════════════════
   리셋 / 재스캔
══════════════════════════════════════════ */
function resetScanner() {
  scanned      = { PO: null, TKM: null, SN: null };
  lastScanType = null;
  lastScanRaw  = null;

  /* 칩 초기화 */
  BARCODE_TYPES.forEach(t => {
    const chip = $('chip-' + t);
    chip.classList.remove('done', 'flash');
    chip.querySelector('.mi').textContent = CHIP_ICONS[t];
  });

  /* result 초기화 */
  resultBox.className = '';
  $('res-icon').textContent = $('res-title').textContent = $('res-detail').textContent = '';
  rescanBtn.classList.remove('show');

  /* 수동 입력 초기화 */
  ['po','tkm','sn'].forEach(k => {
    const inp = $('m-' + k);
    if (inp) { inp.value = ''; inp.classList.remove('filled'); }
  });
  $('manual-go-btn').classList.remove('show');

  /* 스캔 재개 */
  const isManual = $('manual-section').classList.contains('show');
  if (isManual) {
    scanMsg.textContent = '';
    $('manual-section').classList.add('show');
  } else {
    document.getElementById('scan-line').style.animationPlayState = 'running';
    scanning = true;
    scanMsg.innerHTML = `<span class="type-label">${NEXT_HINT.PO}</span>를 스캔하세요`;
  }
}

/* ══════════════════════════════════════════
   진입점
══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async () => {
  /* PC면 app 숨긴 상태이므로 로직 중단 */
  if (!$('app') || $('app').style.display === 'none') return;

  /* 1. verification_sets 동기화 (master_jobs + shipments 조인) */
  await doSync();

  /* 2. 카메라 시작 */
  await startCamera();
});
</script>
