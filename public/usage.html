<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>사용 입력 - 파트 단가 관리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">⚙️ 파트 단가 관리 시스템</span>
    <div class="d-flex gap-3">
      <a href="index.html" class="nav-link text-white">대시보드</a>
      <a href="parts.html" class="nav-link text-white">파트 관리</a>
      <a href="lots.html" class="nav-link text-white">배치 관리</a>
      <a href="history.html" class="nav-link text-white">이력 조회</a><a href="quotation.html" class="nav-link text-white">견적 생성</a>
      <a href="master-fill.html" class="nav-link text-white">마스터 업데이트</a>
    </div>
  </nav>

  <div class="container p-4" style="max-width: 700px;">
    <h5 class="mb-4">📥 파트 사용 입력 <span class="badge bg-info text-dark">구매팀</span></h5>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">교체 날짜 <span class="text-danger">*</span></label>
          <input type="date" class="form-control" id="f-date">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Part Number <span class="text-danger">*</span></label>
          <select class="form-select font-monospace" id="f-pn" onchange="updatePreview()">
            <option value="">-- 파트 선택 --</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">이번 교체 수량 <span class="text-danger">*</span></label>
          <input type="number" class="form-control" id="f-qty" placeholder="0" min="1" oninput="updatePreview()">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">입력자</label>
          <select class="form-select" id="f-team">
            <option value="구매팀">구매팀</option>
            <option value="영업팀">영업팀</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">비고</label>
          <input type="text" class="form-control" id="f-note" placeholder="선택 입력">
        </div>

        <!-- 미리보기 -->
        <div id="preview" class="alert alert-info d-none">
          <div class="fw-bold mb-2">📋 입력 후 예상 현황</div>
          <div id="preview-content"></div>
        </div>

        <button class="btn btn-primary w-100" onclick="submit()">저장</button>
      </div>
    </div>

    <div id="result" class="d-none"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let partsData = [];

    async function loadParts() {
      const res = await fetch('/api/dashboard');
      partsData = await res.json();
      const sel = document.getElementById('f-pn');
      sel.innerHTML = '<option value="">-- 파트 선택 --</option>';
      partsData.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.part_number;
        opt.textContent = `${p.part_number} (${p.type || ''}) - 현재 누적: ${p.cumulative}개`;
        sel.appendChild(opt);
      });
      // 오늘 날짜 기본값
      document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
    }

    function updatePreview() {
      const pn = document.getElementById('f-pn').value;
      const qty = parseInt(document.getElementById('f-qty').value) || 0;
      if (!pn || !qty) { document.getElementById('preview').classList.add('d-none'); return; }

      const part = partsData.find(p => p.part_number === pn);
      if (!part) return;

      const newCumulative = part.cumulative + qty;
      const threshold = part.qty_threshold;

      let html = `<table class="table table-sm mb-0">`;
      html += `<tr><td>현재 누적 수량</td><td class="fw-bold">${part.cumulative.toLocaleString()}개</td></tr>`;
      html += `<tr><td>이번 수량</td><td class="fw-bold text-primary">+${qty.toLocaleString()}개</td></tr>`;
      html += `<tr><td>입력 후 누적</td><td class="fw-bold">${newCumulative.toLocaleString()}개</td></tr>`;
      html += `<tr><td>Q'ty 기준</td><td>${threshold.toLocaleString()}개</td></tr>`;

      if (part.cumulative <= threshold && newCumulative > threshold) {
        const asIsQty = threshold - part.cumulative;
        const toBeQty = qty - asIsQty;
        html += `<tr class="table-warning"><td colspan="2">⚠️ 이번 입력으로 단가 전환 발생!</td></tr>`;
        html += `<tr><td>&nbsp;&nbsp;As-is 적용 수량</td><td>${asIsQty}개 × $${part.price_as_is.toFixed(2)} = $${(asIsQty*part.price_as_is).toLocaleString('en',{minimumFractionDigits:2})}</td></tr>`;
        html += `<tr><td>&nbsp;&nbsp;To-be 적용 수량</td><td>${toBeQty}개 × $${part.price_to_be.toFixed(2)} = $${(toBeQty*part.price_to_be).toLocaleString('en',{minimumFractionDigits:2})}</td></tr>`;
      } else {
        const appliedPrice = newCumulative > threshold ? part.price_to_be : part.price_as_is;
        const priceType = newCumulative > threshold ? 'To-be' : 'As-is';
        const badgeClass = newCumulative > threshold ? 'bg-danger' : 'bg-success';
        html += `<tr><td>적용 단가</td><td><span class="badge ${badgeClass}">${priceType}</span> $${appliedPrice.toFixed(2)}</td></tr>`;
        html += `<tr><td>이번 청구 금액</td><td class="fw-bold text-primary">$${(qty * appliedPrice).toLocaleString('en',{minimumFractionDigits:2})}</td></tr>`;
      }
      html += `</table>`;

      document.getElementById('preview-content').innerHTML = html;
      document.getElementById('preview').classList.remove('d-none');
    }

    async function submit() {
      const date = document.getElementById('f-date').value;
      const pn = document.getElementById('f-pn').value;
      const qty = document.getElementById('f-qty').value;
      const team = document.getElementById('f-team').value;
      const note = document.getElementById('f-note').value;

      if (!date || !pn || !qty) { alert('날짜, Part Number, 수량은 필수 입력 항목입니다.'); return; }

      const res = await fetch('/api/usage', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ date, part_number: pn, quantity: parseInt(qty), note, team })
      });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }

      const resultDiv = document.getElementById('result');
      resultDiv.className = 'alert alert-success';
      resultDiv.innerHTML = `✅ 저장 완료! (${pn} / ${qty}개 / ${date})`;
      resultDiv.classList.remove('d-none');

      document.getElementById('f-pn').value = '';
      document.getElementById('f-qty').value = '';
      document.getElementById('f-note').value = '';
      document.getElementById('preview').classList.add('d-none');
      loadParts();

      setTimeout(() => resultDiv.classList.add('d-none'), 3000);
    }

    loadParts();
  </script>
</body>
</html>
