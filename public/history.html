<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이력 조회 - 파트 단가 관리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">⚙️ 파트 단가 관리 시스템</span>
    <div class="d-flex gap-3">
      <a href="index.html" class="nav-link text-white">대시보드</a>
      <a href="parts.html" class="nav-link text-white">파트 관리</a>
      <a href="lots.html" class="nav-link text-white">배치 관리</a>
      <a href="history.html" class="nav-link text-white active">이력 조회</a><a href="quotation.html" class="nav-link text-white">견적 생성</a>
      <a href="master-fill.html" class="nav-link text-white">마스터 업데이트</a>
    </div>
  </nav>

  <div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">📋 사용 이력 조회</h5>
      <div class="d-flex gap-2 align-items-center">
        <select class="form-select form-select-sm" id="filter-pn" onchange="load()" style="width:280px">
          <option value="">전체 파트</option>
        </select>
        <button class="btn btn-outline-primary btn-sm" onclick="load()">🔄 새로고침</button>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-dark">
            <tr>
              <th>날짜</th>
              <th>Part Number</th>
              <th>Description</th>
              <th class="text-center">이번 수량</th>
              <th class="text-center">누적 수량</th>
              <th class="text-center">단가 구분</th>
              <th class="text-end">적용 단가 ($)</th>
              <th class="text-end">청구 금액 ($)</th>
              <th>입력자</th>
              <th>비고</th>
              <th class="text-center">삭제</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="11" class="text-center text-muted py-4">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 합계 -->
    <div class="mt-3 text-end" id="total-row"></div>
  </div>

  <script>
    async function loadParts() {
      const res = await fetch('/api/parts');
      const parts = await res.json();
      const sel = document.getElementById('filter-pn');
      sel.innerHTML = '<option value="">전체 파트</option>';
      parts.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.part_number;
        opt.textContent = `${p.part_number} (${p.type || ''})`;
        sel.appendChild(opt);
      });
    }

    async function load() {
      const pn = document.getElementById('filter-pn').value;
      const url = pn ? `/api/usage?part_number=${encodeURIComponent(pn)}` : '/api/usage';
      const res = await fetch(url);
      const rows = await res.json();
      const tbody = document.getElementById('history-body');

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">이력이 없습니다.</td></tr>';
        document.getElementById('total-row').innerHTML = '';
        return;
      }

      tbody.innerHTML = rows.map(r => {
        const badgeClass = r.price_type === 'To-be' ? 'bg-danger' : 'bg-success';
        const rowClass = r.price_type === 'To-be' ? 'table-danger' : '';
        return `<tr class="${rowClass}">
          <td>${r.date}</td>
          <td class="fw-semibold font-monospace">${r.part_number}</td>
          <td class="small text-muted">${r.description || '-'}</td>
          <td class="text-center">${r.quantity.toLocaleString()}</td>
          <td class="text-center fw-bold">${r.cumulative.toLocaleString()}</td>
          <td class="text-center"><span class="badge ${badgeClass}">${r.price_type}</span></td>
          <td class="text-end">$${(r.applied_price||0).toLocaleString('en',{minimumFractionDigits:2})}</td>
          <td class="text-end fw-bold">$${(r.total_amount||0).toLocaleString('en',{minimumFractionDigits:2})}</td>
          <td><span class="badge bg-light text-dark">${r.team || '-'}</span></td>
          <td class="small text-muted">${r.note || ''}</td>
          <td class="text-center">
            <button class="btn btn-outline-danger btn-sm py-0" onclick="deleteUsage(${r.id})">삭제</button>
          </td>
        </tr>`;
      }).join('');

      const totalAmt = rows.reduce((s, r) => s + (r.total_amount || 0), 0);
      const totalQty = rows.reduce((s, r) => s + r.quantity, 0);
      document.getElementById('total-row').innerHTML =
        `<span class="text-muted me-3">총 ${rows.length}건 / ${totalQty.toLocaleString()}개</span>
         <strong class="text-primary">합계: $${totalAmt.toLocaleString('en',{minimumFractionDigits:2})}</strong>`;
    }

    async function deleteUsage(id) {
      if (!confirm('이 이력을 삭제하시겠습니까?')) return;
      await fetch(`/api/usage/${id}`, { method: 'DELETE' });
      load();
    }

    loadParts().then(load);
  </script>
</body>
</html>
